# ============================================
# docker-compose.yml - 智扫通机器人智能客服
# 一键启动所有服务
# ============================================
version: "3.8"

services:
  # Streamlit 前端
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-sweeping-agent-ui
    ports:
      - "8501:8501"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - CHAT_MODEL_NAME=${CHAT_MODEL_NAME:-qwen3-max}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-text-embedding-v4}
      - WEATHER_API_PROVIDER=${WEATHER_API_PROVIDER:-wttr}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    restart: unless-stopped
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501

  # FastAPI 后端 API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-sweeping-agent-api
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - CHAT_MODEL_NAME=${CHAT_MODEL_NAME:-qwen3-max}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-text-embedding-v4}
      - WEATHER_API_PROVIDER=${WEATHER_API_PROVIDER:-wttr}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    restart: unless-stopped
    command: uvicorn api:app --host 0.0.0.0 --port 8000
